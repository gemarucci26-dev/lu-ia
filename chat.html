<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LuIA - Chat">
    <title>LuIA | Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <nav class="navbar" style="justify-content: space-between;">
        <a href="index.html" class="back-link">← Voltar</a>
        <div class="logo">LuIA</div>
        <div style="width: 60px;"></div> <!-- Spacer for centering logo -->
    </nav>

    <div class="chat-container" id="chat-container">
        <!-- Messages will be injected here -->
    </div>

    <div class="chat-input-area">
        <div class="chat-input-wrapper">
            <input type="text" id="chat-input" placeholder="Faça outra pergunta..." autocomplete="off">
            <button class="btn-send" id="btn-send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
